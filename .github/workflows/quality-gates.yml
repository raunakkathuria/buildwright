name: Quality Gates

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install CLI dependencies
        run: npm --prefix cli ci

      - name: Generate synced files
        run: make sync

      - name: Sync check
        run: make sync-check

      - name: Check tracked generated docs
        run: git diff --exit-code -- cli/README.md

      - name: Validate skill metadata
        run: make validate

      - name: Validate command docs
        run: .buildwright/scripts/validate-docs.sh

      - name: Check CLI JavaScript syntax
        run: |
          find cli/bin cli/src cli/scripts -name "*.js" -print0 | xargs -0 -n1 node -c

      - name: Smoke test CLI command listing
        run: node cli/bin/buildwright.js commands

      - name: Check broken symlinks
        run: |
          set -e
          find . -path ./node_modules -prune -o -type l -print | while IFS= read -r link; do
            if [ ! -e "$link" ]; then
              echo "broken symlink: $link"
              exit 1
            fi
          done

      - name: Check Buildwright structure
        run: |
          set -e

          actual_commands="$(find .buildwright/commands -maxdepth 1 -name 'bw-*.md' -exec basename {} .md \; | sort | tr '\n' ' ' | sed 's/ $//')"
          expected_commands="bw-analyse bw-plan bw-ship bw-verify bw-work"
          if [ "$actual_commands" != "$expected_commands" ]; then
            echo "Unexpected command set: $actual_commands"
            echo "Expected command set: $expected_commands"
            exit 1
          fi

          for command in $expected_commands; do
            test -d "skills/$command"
            test -f "skills/$command/SKILL.md"
            test -f ".claude/commands/$command.md"
            test -f ".opencode/commands/$command.md"
            test -f ".cursor/rules/commands/$command.mdc"
          done

          test -f ".buildwright/steering/philosophy.md"
          test -f ".claude/steering/philosophy.md"
          test -f ".opencode/steering/philosophy.md"
          test -f ".cursor/rules/steering/philosophy.mdc"

          # Every canonical framework doc must be synced to all targets.
          # Derive from the directory so a new doc is covered automatically.
          for doc in $(find .buildwright/framework -mindepth 1 -maxdepth 1 -name '*.md' -exec basename {} .md \;); do
            test -f ".claude/framework/$doc.md"
            test -f ".opencode/framework/$doc.md"
            test -f ".cursor/rules/framework/$doc.mdc"
          done

          top_level="$(find .buildwright -mindepth 1 -maxdepth 1 -type d -exec basename {} \; | sort | tr '\n' ' ' | sed 's/ $//')"
          case "$top_level" in
            "agents commands framework scripts steering"|"agents codebase commands framework scripts steering")
              ;;
            *)
              echo "Unexpected .buildwright directories: $top_level"
              exit 1
              ;;
          esac

          test ! -e "cli/templates/.github"
          test ! -e "cli/templates/docs"
          test ! -e "cli/templates/scripts"
          test ! -e "cli/templates/Makefile"
