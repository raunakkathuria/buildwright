name: Quality Gates

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install CLI dependencies
        run: npm --prefix cli ci

      - name: Sync check
        run: make sync-check

      - name: Validate skill metadata
        run: make validate

      - name: Validate command docs
        run: scripts/validate-docs.sh

      - name: Check CLI JavaScript syntax
        run: |
          find cli/bin cli/src cli/scripts -name "*.js" -print0 | xargs -0 -n1 node -c

      - name: Smoke test CLI command listing
        run: node cli/bin/buildwright.js commands

      - name: Check stale Buildwright references
        run: |
          old_feature="bw-new""-feature"
          old_quick="bw""-quick"
          old_claw="bw""-claw"
          old_help="bw""-help"
          old_tasks=".buildwright""/tasks"
          old_task_template="tasks""/TEMPLATE"
          old_requirements="docs""/requirements"
          old_requirements_template="requirements""/TEMPLATE"
          old_skills=".buildwright""/skills"
          old_worktree="bw""-worktree"
          old_isolated="isolated"" workspace"
          old_quality="quality-gates"".md"
          old_naming="naming-conventions"".md"
          old_philosophy="engineering-philosophy"".md"
          old_architect_file="architect"".md"
          old_architect="Arch""itect"

          ! git grep -n "$old_feature\|$old_quick\|$old_claw\|$old_help"
          ! git grep -n "$old_tasks\|$old_task_template\|$old_requirements\|$old_requirements_template"
          ! git grep -n "$old_skills\|$old_worktree\|$old_isolated"
          ! git grep -n "$old_quality\|$old_naming\|$old_philosophy\|$old_architect_file\|$old_architect"
