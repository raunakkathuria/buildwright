name: Quality Gates

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install CLI dependencies
        run: npm --prefix cli ci

      - name: Generate synced files
        run: make sync

      - name: Sync check
        run: make sync-check

      - name: Check tracked generated docs
        run: git diff --exit-code -- cli/README.md

      - name: Validate skill metadata
        run: make validate

      - name: Validate command docs
        run: scripts/validate-docs.sh

      - name: Check CLI JavaScript syntax
        run: |
          find cli/bin cli/src cli/scripts -name "*.js" -print0 | xargs -0 -n1 node -c

      - name: Smoke test CLI command listing
        run: node cli/bin/buildwright.js commands

      - name: Check stale Buildwright references
        run: |
          set -e

          assert_absent() {
            if git grep -n -F -- "$1"; then
              exit 1
            fi
          }

          old_feature="bw-new""-feature"
          old_quick="bw""-quick"
          old_claw="bw""-claw"
          old_help="bw""-help"
          old_tasks=".buildwright""/tasks"
          old_task_template="tasks""/TEMPLATE"
          old_requirements="docs""/requirements"
          old_requirements_template="requirements""/TEMPLATE"
          old_skills=".buildwright""/skills"
          old_worktree="bw""-worktree"
          old_isolated="isolated"" workspace"
          old_quality="quality-gates"".md"
          old_naming="naming-conventions"".md"
          old_philosophy="engineering-philosophy"".md"
          old_architect_file="architect"".md"
          old_architect="Arch""itect"

          assert_absent "$old_feature"
          assert_absent "$old_quick"
          assert_absent "$old_claw"
          assert_absent "$old_help"
          assert_absent "$old_tasks"
          assert_absent "$old_task_template"
          assert_absent "$old_requirements"
          assert_absent "$old_requirements_template"
          assert_absent "$old_skills"
          assert_absent "$old_worktree"
          assert_absent "$old_isolated"
          assert_absent "$old_quality"
          assert_absent "$old_naming"
          assert_absent "$old_philosophy"
          assert_absent "$old_architect_file"
          assert_absent "$old_architect"
